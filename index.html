<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- iOS PWA / Bookmark meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="OutdoorScore" />
  <meta name="theme-color" content="#05120a" id="themeColor" />
  <meta name="mobile-web-app-capable" content="yes" />

  <title>Outdoor Score</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #4ade80;
      --accent2: #4ade80;
      --bg1: #05120a;
      --bg2: #081a0c;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--bg1);
      color: white;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg1) 100%);
      min-height: 100dvh;
      transition: background 0.8s ease;
    }

    #app {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: calc(var(--safe-top) + 40px) 20px calc(var(--safe-bottom) + 48px);
      min-height: 100dvh;
    }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 24px; animation: fadeUp 0.5s ease; }
    .header-eyebrow { font-size: 10px; letter-spacing: 4px; color: #1e293b; text-transform: uppercase; margin-bottom: 6px; }
    .header-title { font-size: clamp(1.7rem, 6vw, 2.5rem); font-weight: 700; line-height: 1.15; color: white; transition: all 0.4s; }
    .header-title .accent { color: var(--accent); transition: color 0.4s; }
    .header-sub { color: #1e293b; font-size: 13px; margin-top: 7px; transition: color 0.4s; }

    /* ── Toggle ── */
    .toggle-row { display: flex; align-items: center; gap: 16px; margin-bottom: 26px; }
    .toggle-label { font-size: 13px; font-weight: 600; min-width: 52px; transition: color 0.4s; }
    .toggle-label.left { text-align: right; }

    .toggle-track {
      position: relative; width: 120px; height: 52px; border-radius: 26px;
      cursor: pointer; user-select: none; overflow: hidden;
      transition: background 0.5s ease, box-shadow 0.4s, border-color 0.4s;
      flex-shrink: 0;
    }
    .toggle-track.walk {
      background: linear-gradient(135deg, #fde68a, #f59e0b);
      box-shadow: 0 0 20px #f59e0b55;
      border: 1px solid #fbbf24;
    }
    .toggle-track.star {
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      box-shadow: 0 0 20px #818cf855;
      border: 1px solid #4338ca;
    }

    .toggle-star { position: absolute; border-radius: 50%; background: white; opacity: 0.75; }

    .toggle-orb {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 40px; height: 40px; border-radius: 50%; z-index: 2;
      transition: left 0.45s cubic-bezier(0.34,1.56,0.64,1), background 0.4s, box-shadow 0.4s;
    }
    .toggle-track.walk .toggle-orb {
      left: calc(100% - 46px);
      background: radial-gradient(circle at 35% 35%, #fef9c3, #fde68a, #f59e0b);
      box-shadow: 0 0 14px #fbbf24, 0 0 28px #f59e0b44;
    }
    .toggle-track.star .toggle-orb {
      left: 6px;
      background: radial-gradient(circle at 35% 35%, #ede9fe, #c4b5fd, #818cf8);
      box-shadow: 0 0 14px #818cf8, 0 0 28px #4338ca44;
    }
    .crater { position: absolute; border-radius: 50%; background: rgba(99,102,241,0.35); }
    .crater1 { top: 9px; left: 11px; width: 9px; height: 9px; }
    .crater2 { top: 22px; left: 20px; width: 5px; height: 5px; }

    /* ── Search ── */
    .search-wrap { width: 100%; max-width: 460px; margin-bottom: 22px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 8px; }

    input[type="text"] {
      flex: 1; padding: 13px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.04); color: white;
      font-size: 16px; /* 16px prevents iOS zoom */
      outline: none; font-family: 'Outfit', sans-serif;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder { color: #1e293b; }
    input[type="text"]:focus { border-color: rgba(255,255,255,0.22); }

    .btn-search {
      padding: 13px 20px; border-radius: 12px; border: none;
      color: white; cursor: pointer; font-size: 14px; font-weight: 600;
      font-family: 'Outfit', sans-serif; white-space: nowrap;
      transition: background 0.4s, color 0.4s;
      -webkit-appearance: none;
    }
    .btn-gps {
      width: 100%; padding: 11px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02); color: #334155;
      cursor: pointer; font-size: 12px; font-family: 'Outfit', sans-serif;
      -webkit-appearance: none;
    }
    .favorites-row {
      display: flex; gap: 7px; margin-top: 8px;
    }
    .btn-fav {
      flex: 1; padding: 10px 6px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04); color: #64748b;
      cursor: pointer; font-size: 11px; font-weight: 500;
      font-family: 'Outfit', sans-serif; text-align: center;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      -webkit-appearance: none; line-height: 1.4;
    }
    .btn-fav:active { background: rgba(255,255,255,0.1); color: white; }
    .btn-fav.active { border-color: var(--accent); color: white; background: rgba(255,255,255,0.07); }
    .error-msg { color: #f87171; font-size: 12px; margin-top: 8px; text-align: center; }

    /* ── Loading ── */
    .loading { display: flex; flex-direction: column; align-items: center; gap: 12px; color: #334155; }
    .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--accent);
      animation: spin 0.75s linear infinite;
    }
    .loading-text { font-size: 11px; letter-spacing: 2px; }

    /* ── Results ── */
    .results { width: 100%; max-width: 460px; animation: fadeUp 0.45s ease; }
    .loc-label { text-align: center; color: #334155; font-size: 12px; margin-bottom: 16px; }

    /* Score card */
    .score-card {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.025);
      border-radius: 24px; padding: 28px 24px; margin-bottom: 12px;
      transition: border-color 0.4s, box-shadow 0.4s;
    }
    .score-caption { color: #334155; font-size: 13px; text-align: center; max-width: 260px; line-height: 1.65; }

    /* Ring */
    #ringTrack { transition: stroke 0.4s; }
    #ringFill  { transition: stroke 0.4s; filter: drop-shadow(0 0 8px var(--accent)); }
    #ringNum   { fill: white; font-size: 36px; font-weight: 700; font-family: 'Outfit', sans-serif; }
    #ringLabel { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; font-family: 'Outfit', sans-serif; }

    /* Pills */
    .pills-card {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 16px; padding: 14px; margin-bottom: 10px;
    }
    .section-label { font-size: 9px; letter-spacing: 3px; color: #1e293b; text-transform: uppercase; margin-bottom: 10px; }
    .pills-row { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    .pill {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 10px 12px; border-radius: 12px; min-width: 66px;
    }
    .pill.hi { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.13); }
    .pill.lo { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
    .pill-icon { font-size: 17px; }
    .pill-val  { color: white; font-size: 12px; font-weight: 600; }
    .pill-lbl  { color: #334155; font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; }

    /* Factors */
    .factors-card { border-radius: 16px; padding: 14px 18px; transition: background 0.4s, border-color 0.4s; }
    .factors-title { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px; opacity: 0.6; color: var(--accent); }
    .factor-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .factor-row:last-child { border-bottom: none; }
    .factor-lbl { color: #475569; font-size: 12px; }
    .factor-val { font-size: 12px; font-weight: 600; }
    .good  { color: #4ade80; }
    .meh   { color: #facc15; }
    .bad   { color: #f87171; }

    /* Empty */
    .empty { text-align: center; color: #1e293b; font-size: 13px; max-width: 260px; line-height: 1.9; margin-top: 8px; }
    .empty-icon { font-size: 44px; margin-bottom: 14px; }

    /* Animations */
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes twinkle { from { opacity: 0.2; transform: scale(0.6); } to { opacity: 1; transform: scale(1.3); } }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <p class="header-eyebrow">Outdoor Conditions</p>
    <h1 class="header-title" id="headerTitle">🚶 Walk <span class="accent" id="headerAccent">Score</span></h1>
    <p class="header-sub" id="headerSub">How's the weather for a walk right now?</p>
  </div>

  <!-- Toggle -->
  <div class="toggle-row">
    <span class="toggle-label left" id="lblWalk" style="color:#fbbf24">Walk</span>
    <div class="toggle-track walk" id="toggleTrack" onclick="toggleMode()">
      <div class="toggle-orb" id="toggleOrb">
        <div class="crater crater1" id="crater1" style="display:none"></div>
        <div class="crater crater2" id="crater2" style="display:none"></div>
      </div>
    </div>
    <span class="toggle-label" id="lblStar" style="color:#1e293b">Stargaze</span>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-row">
      <input type="text" id="searchInput" placeholder="City, town, or place…" />
      <button class="btn-search" id="btnSearch" onclick="doSearch()">Search</button>
    </div>
    <button class="btn-gps" onclick="useGPS()">📍 Use my current location</button>
    <div class="favorites-row">
      <button class="btn-fav active" id="fav0" onclick="loadFav(0)">📍 Newmarket<br>NH</button>
      <button class="btn-fav" id="fav1" onclick="loadFav(1)">⚓ Portsmouth<br>NH</button>
      <button class="btn-fav" id="fav2" onclick="loadFav(2)">🌊 Pewaukee<br>WI</button>
    </div>
    <p class="error-msg" id="errorMsg" style="display:none"></p>
  </div>

  <!-- Loading -->
  <div class="loading" id="loadingEl" style="display:none">
    <div class="spinner" id="spinner"></div>
    <span class="loading-text">FETCHING CONDITIONS…</span>
  </div>

  <!-- Results -->
  <div class="results" id="resultsEl" style="display:none">
    <p class="loc-label" id="locLabel"></p>

    <!-- Score ring card -->
    <div class="score-card" id="scoreCard">
      <svg width="160" height="160" viewBox="0 0 160 160" style="transform:rotate(-90deg)">
        <circle id="ringTrack" cx="80" cy="80" r="60" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
        <circle id="ringFill"  cx="80" cy="80" r="60" fill="none" stroke="#4ade80" stroke-width="12"
          stroke-dasharray="0 377" stroke-linecap="round"/>
      </svg>
      <!-- overlay text, centered via absolute -->
      <div style="position:relative;margin-top:-160px;width:160px;height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;pointer-events:none">
        <span id="ringNum"   style="font-size:36px;font-weight:700;color:white;font-family:'Outfit',sans-serif;line-height:1">0</span>
        <span id="ringLabel" style="font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;font-family:'Outfit',sans-serif"></span>
      </div>
      <p class="score-caption" id="scoreCaption"></p>
    </div>

    <!-- Weather pills -->
    <div class="pills-card">
      <p class="section-label">Current Conditions</p>
      <div class="pills-row" id="pillsRow"></div>
    </div>

    <!-- Factor breakdown -->
    <div class="factors-card" id="factorsCard">
      <p class="factors-title" id="factorsTitle"></p>
      <div id="factorsBody"></div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty" id="emptyEl">
    <div class="empty-icon" id="emptyIcon">🌿</div>
    <span id="emptyText">Search a location above to get your walking score</span>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let mode = "walk";
let weather = null;
let moon = getMoonPhase();
let animFrame = null;
let currentScore = 0;

// ── Moon phase ────────────────────────────────────────────────────────────────
function getMoonPhase(date = new Date()) {
  const yr = date.getFullYear(), mo = date.getMonth() + 1, dy = date.getDate();
  let jd;
  if (mo < 3) { const y = yr - 1, m = mo + 12; jd = Math.floor(365.25*y) + Math.floor(30.6*(m+1)) + dy - 694039.09; }
  else         { jd = Math.floor(365.25*yr) + Math.floor(30.6*(mo+1)) + dy - 694039.09; }
  jd /= 29.5305882;
  const phase = jd - Math.floor(jd);
  const icons = ["🌑","🌒","🌓","🌔","🌕","🌖","🌗","🌘"];
  return { phase, icon: icons[Math.round(phase*8)%8], illumination: Math.round(Math.abs(Math.sin(phase*Math.PI))*100) };
}

// ── Scoring ───────────────────────────────────────────────────────────────────
function calcWalkScore(w) {
  let s = 100;
  const t = w.temp_c;
  if (t < 0) s -= 35; else if (t < 5) s -= 20; else if (t < 10) s -= 10;
  else if (t > 35) s -= 30; else if (t > 30) s -= 15; else if (t > 25) s -= 5;
  if (w.precip_prob > 80) s -= 35; else if (w.precip_prob > 50) s -= 20;
  else if (w.precip_prob > 30) s -= 10; else if (w.precip_prob > 15) s -= 5;
  if (w.wind_kph > 60) s -= 25; else if (w.wind_kph > 40) s -= 15; else if (w.wind_kph > 25) s -= 8;
  if (w.cloud_cover > 90) s -= 5;
  if (w.humidity > 85) s -= 8; else if (w.humidity > 75) s -= 4;
  return Math.max(0, Math.min(100, Math.round(s)));
}

function calcStarScore(w, m) {
  let s = 100;
  if (w.cloud_cover > 80) s -= 50; else if (w.cloud_cover > 60) s -= 35;
  else if (w.cloud_cover > 40) s -= 20; else if (w.cloud_cover > 20) s -= 10; else if (w.cloud_cover > 10) s -= 5;
  if (w.precip_prob > 50) s -= 25; else if (w.precip_prob > 20) s -= 12; else if (w.precip_prob > 5) s -= 5;
  if (m.illumination > 90) s -= 20; else if (m.illumination > 70) s -= 12; else if (m.illumination > 40) s -= 6;
  if (w.humidity > 85) s -= 10; else if (w.humidity > 70) s -= 5;
  if (w.visibility_km < 5) s -= 20; else if (w.visibility_km < 10) s -= 10; else if (w.visibility_km < 20) s -= 5;
  if (w.wind_kph > 40) s -= 10;
  return Math.max(0, Math.min(100, Math.round(s)));
}

function getLabel(score, m) {
  if (m === "walk") {
    if (score >= 80) return ["Excellent", "#4ade80"];
    if (score >= 60) return ["Good",      "#a3e635"];
    if (score >= 40) return ["Fair",      "#facc15"];
    if (score >= 20) return ["Poor",      "#fb923c"];
    return                  ["Stay In",   "#f87171"];
  } else {
    if (score >= 80) return ["Spectacular","#c4b5fd"];
    if (score >= 60) return ["Good",       "#a78bfa"];
    if (score >= 40) return ["Mediocre",   "#818cf8"];
    if (score >= 20) return ["Poor",       "#f472b6"];
    return                  ["Obscured",   "#f87171"];
  }
}

// ── Toggle ────────────────────────────────────────────────────────────────────
function toggleMode() {
  mode = mode === "walk" ? "star" : "walk";
  applyMode();
  if (weather) renderResults();
}

function applyMode() {
  const isWalk = mode === "walk";
  const track  = document.getElementById("toggleTrack");
  const orb    = document.getElementById("toggleOrb");
  const c1     = document.getElementById("crater1");
  const c2     = document.getElementById("crater2");

  track.className = "toggle-track " + mode;
  c1.style.display = isWalk ? "none" : "block";
  c2.style.display = isWalk ? "none" : "block";

  // Remove any existing stars
  track.querySelectorAll(".toggle-star").forEach(el => el.remove());
  if (!isWalk) {
    [[22,10,2.5],[42,22,2],[16,28,2],[52,8,1.5],[34,36,1.5]].forEach(([x,y,r],i) => {
      const dot = document.createElement("div");
      dot.className = "toggle-star";
      dot.style.cssText = `left:${x}px;top:${y}px;width:${r*2}px;height:${r*2}px;animation:twinkle ${1.1+i*0.3}s ease-in-out ${i*0.2}s infinite alternate;`;
      track.insertBefore(dot, orb);
    });
  }

  // Labels
  document.getElementById("lblWalk").style.color = isWalk ? "#fbbf24" : "#1e293b";
  document.getElementById("lblStar").style.color = !isWalk ? "#a78bfa" : "#1e293b";

  // Header
  document.getElementById("headerTitle").innerHTML = isWalk
    ? '🚶 Walk <span class="accent" id="headerAccent">Score</span>'
    : '🔭 Stargaze <span class="accent" id="headerAccent">Score</span>';
  document.getElementById("headerSub").textContent = isWalk
    ? "How's the weather for a walk right now?"
    : "Will the skies be clear enough to stargaze?";

  // Accent CSS variable & theme color
  const accent = isWalk ? "#4ade80" : "#818cf8";
  document.documentElement.style.setProperty("--accent", accent);
  document.documentElement.style.setProperty("--bg1", isWalk ? "#05120a" : "#04060f");
  document.documentElement.style.setProperty("--bg2", isWalk ? "#081a0c" : "#080b1a");
  document.getElementById("themeColor").setAttribute("content", isWalk ? "#05120a" : "#04060f");

  // Search button
  const btn = document.getElementById("btnSearch");
  btn.style.background = accent;
  btn.style.color = isWalk ? "#052e16" : "white";

  // Empty state
  document.getElementById("emptyIcon").textContent = isWalk ? "🌿" : "🌌";
  document.getElementById("emptyText").textContent = `Search a location above to get your ${isWalk ? "walking" : "stargazing"} score`;
}

// ── Ring animation ────────────────────────────────────────────────────────────
function animateRing(targetScore) {
  const fill  = document.getElementById("ringFill");
  const numEl = document.getElementById("ringNum");
  const lblEl = document.getElementById("ringLabel");
  const r = 60, circ = 2 * Math.PI * r;
  const [labelText, color] = getLabel(targetScore, mode);
  const fromScore = currentScore;
  let start = null;

  fill.setAttribute("stroke", color);
  fill.style.filter = `drop-shadow(0 0 8px ${color}88)`;
  lblEl.textContent = labelText;
  lblEl.style.color = color;

  cancelAnimationFrame(animFrame);
  function step(ts) {
    if (!start) start = ts;
    const p = Math.min((ts - start) / 900, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const v = Math.round(fromScore + (targetScore - fromScore) * ease);
    const dash = (v / 100) * circ;
    fill.setAttribute("stroke-dasharray", `${dash} ${circ}`);
    numEl.textContent = v;
    if (p < 1) animFrame = requestAnimationFrame(step);
    else currentScore = targetScore;
  }
  animFrame = requestAnimationFrame(step);
}

// ── Render results ────────────────────────────────────────────────────────────
function renderResults() {
  const isWalk = mode === "walk";
  const score  = isWalk ? calcWalkScore(weather) : calcStarScore(weather, moon);
  const accent = isWalk ? "#4ade80" : "#818cf8";

  // Score card border/shadow
  const card = document.getElementById("scoreCard");
  card.style.border = `1px solid ${accent}1a`;
  card.style.boxShadow = `0 0 50px ${accent}08`;

  // Caption
  const cap = document.getElementById("scoreCaption");
  if (isWalk) {
    cap.textContent = score >= 70 ? "Great conditions — get outside!" : score >= 45 ? "Walkable, but dress for it." : "Probably better to stay in.";
  } else {
    cap.textContent = score >= 70 ? "Clear skies — grab your telescope!" : score >= 45 ? "Some stars visible through the haze." : "Conditions poor for stargazing tonight.";
  }

  animateRing(score);

  // Pills
  const pills = [
    { icon:"🌡️", lbl:"Temp",       val:`${weather.temp_c}°C`,                      hi: isWalk  },
    { icon:"💧", lbl:"Humidity",   val:`${weather.humidity}%`,                      hi: !isWalk },
    { icon:"🌧️", lbl:"Rain",       val:`${weather.precip_prob}%`,                   hi: true    },
    { icon:"☁️", lbl:"Cloud",      val:`${weather.cloud_cover}%`,                   hi: !isWalk },
    { icon:"💨", lbl:"Wind",       val:`${weather.wind_kph} km/h`,                  hi: isWalk  },
    { icon:"👁️", lbl:"Visibility", val:`${weather.visibility_km.toFixed(0)} km`,    hi: !isWalk },
    { icon:moon.icon, lbl:"Moon",  val:`${moon.illumination}%`,                     hi: !isWalk },
  ];
  document.getElementById("pillsRow").innerHTML = pills.map(p =>
    `<div class="pill ${p.hi ? "hi" : "lo"}">
       <span class="pill-icon">${p.icon}</span>
       <span class="pill-val">${p.val}</span>
       <span class="pill-lbl">${p.lbl}</span>
     </div>`
  ).join("");

  // Factors
  const fc = document.getElementById("factorsCard");
  fc.style.background = isWalk ? "rgba(74,222,128,0.03)" : "rgba(129,140,248,0.03)";
  fc.style.border = `1px solid ${accent}14`;
  document.getElementById("factorsTitle").textContent = isWalk ? "Walk Factors" : "Stargazing Factors";
  document.getElementById("factorsTitle").style.color = accent;

  const w = weather;
  const factors = isWalk ? [
    ["Temperature", w.temp_c >= 5 && w.temp_c <= 28 ? ["✓","Comfortable","good"] : w.temp_c < 0 ? ["✗","Freezing","bad"] : w.temp_c > 32 ? ["✗","Very hot","bad"] : ["~","Chilly/warm","meh"]],
    ["Rain risk",   w.precip_prob <= 20 ? ["✓","Low","good"] : w.precip_prob <= 50 ? ["~","Moderate","meh"] : ["✗","High","bad"]],
    ["Wind",        w.wind_kph <= 25 ? ["✓","Calm","good"] : w.wind_kph <= 40 ? ["~","Breezy","meh"] : ["✗","Gusty","bad"]],
    ["Humidity",    w.humidity <= 70 ? ["✓","Comfortable","good"] : w.humidity <= 85 ? ["~","Muggy","meh"] : ["✗","Very humid","bad"]],
  ] : [
    ["Cloud cover",  w.cloud_cover <= 20 ? ["✓","Clear","good"] : w.cloud_cover <= 50 ? ["~","Partly cloudy","meh"] : ["✗","Overcast","bad"]],
    ["Atmosphere",   w.humidity <= 65 ? ["✓","Transparent","good"] : w.humidity <= 80 ? ["~","Hazy","meh"] : ["✗","Very humid","bad"]],
    ["Moon",         moon.illumination <= 30 ? ["✓","Dark sky","good"] : moon.illumination <= 60 ? ["~","Partial glow","meh"] : ["✗","Bright moon","bad"]],
    ["Visibility",   w.visibility_km >= 20 ? ["✓","Excellent","good"] : w.visibility_km >= 10 ? ["~","Good","meh"] : ["✗","Poor","bad"]],
  ];

  document.getElementById("factorsBody").innerHTML = factors.map(([lbl, [sym, txt, cls]]) =>
    `<div class="factor-row">
       <span class="factor-lbl">${lbl}</span>
       <span class="factor-val ${cls}">${sym} ${txt}</span>
     </div>`
  ).join("");

  document.getElementById("resultsEl").style.display = "block";
  document.getElementById("emptyEl").style.display   = "none";
}

// ── Geocode + weather fetch ───────────────────────────────────────────────────
async function fetchWeather(lat, lon, name) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,precipitation_probability,cloud_cover,wind_speed_10m,visibility&wind_speed_unit=kmh&timezone=auto`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    const c = data.current;
    weather = {
      temp_c:       c.temperature_2m,
      humidity:     c.relative_humidity_2m,
      precip_prob:  c.precipitation_probability ?? 0,
      cloud_cover:  c.cloud_cover,
      wind_kph:     c.wind_speed_10m,
      visibility_km:(c.visibility || 10000) / 1000,
    };
    document.getElementById("locLabel").textContent = "📍 " + name;
    renderResults();
    showError("");
  } catch {
    showError("Weather fetch failed — please try again.");
  }
  setLoading(false);
}

async function doSearch() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;
  setLoading(true); showError(""); resetResults();

  // Primary: Nominatim
  try {
    const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&addressdetails=1`, { headers:{"Accept-Language":"en"} });
    const data = await res.json();
    if (data.length) {
      const { lat, lon, address } = data[0];
      const city    = address?.city || address?.town || address?.village || address?.county || q;
      const country = address?.country || "";
      await fetchWeather(parseFloat(lat), parseFloat(lon), country ? `${city}, ${country}` : city);
      return;
    }
  } catch {}

  // Fallback: Open-Meteo geocoding
  try {
    const res  = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=1&language=en&format=json`);
    const data = await res.json();
    if (data.results?.length) {
      const r = data.results[0];
      await fetchWeather(r.latitude, r.longitude, `${r.name}, ${r.country}`);
      return;
    }
  } catch {}

  showError("Location not found — try a different city name.");
  setLoading(false);
}

function useGPS() {
  if (!navigator.geolocation) { showError("Geolocation not supported."); return; }
  setLoading(true); showError(""); resetResults();
  navigator.geolocation.getCurrentPosition(async ({ coords: { latitude: lat, longitude: lon } }) => {
    try {
      const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`, { headers:{"Accept-Language":"en"} });
      const d    = await res.json();
      const city = d.address?.city || d.address?.town || d.address?.village || `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
      await fetchWeather(lat, lon, d.address?.country ? `${city}, ${d.address.country}` : city);
    } catch {
      await fetchWeather(lat, lon, `${lat.toFixed(2)}, ${lon.toFixed(2)}`);
    }
  }, () => { showError("Location access denied."); setLoading(false); });
}

// ── UI helpers ────────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById("loadingEl").style.display = on ? "flex" : "none";
  if (on) {
    document.getElementById("resultsEl").style.display = "none";
    document.getElementById("emptyEl").style.display   = "none";
  }
}

function showError(msg) {
  const el = document.getElementById("errorMsg");
  el.textContent = msg;
  el.style.display = msg ? "block" : "none";
}

function resetResults() {
  weather = null;
  currentScore = 0;
  document.getElementById("resultsEl").style.display = "none";
  document.getElementById("emptyEl").style.display   = "none";
}

// Enter key on input
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.target.blur(); doSearch(); }
});

// ── Favorites ────────────────────────────────────────────────────────────────
const FAVS = [
  { name: "Newmarket, NH",  lat: 43.0787,  lon: -70.9395 },
  { name: "Portsmouth, NH", lat: 43.0718,  lon: -70.7626 },
  { name: "Pewaukee, WI",   lat: 43.0811,  lon: -88.2565 },
];

function loadFav(i) {
  const f = FAVS[i];
  document.querySelectorAll(".btn-fav").forEach((b,j) => b.classList.toggle("active", i===j));
  setLoading(true); showError(""); resetResults();
  fetchWeather(f.lat, f.lon, f.name);
}

// ── Init ──────────────────────────────────────────────────────────────────────
applyMode();
loadFav(0);
